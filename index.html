<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cosmic Playground</title>
  <style>
    :root {
      --bg-1: #050510;
      --bg-2: #14143d;
      --accent-a: #6ef3ff;
      --accent-b: #ff7ae0;
      --accent-c: #ffe97a;
      --text: #f4f8ff;
      --glass: rgba(255, 255, 255, 0.1);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--text);
      background: radial-gradient(circle at 20% 20%, #25256d 0%, transparent 25%),
        radial-gradient(circle at 80% 30%, #47205f 0%, transparent 30%),
        linear-gradient(130deg, var(--bg-1), var(--bg-2));
      overflow: hidden;
    }

    .stars,
    .stars::before,
    .stars::after {
      position: fixed;
      inset: 0;
      content: "";
      background-repeat: repeat;
      pointer-events: none;
    }

    .stars {
      background-image:
        radial-gradient(2px 2px at 30px 50px, #ffffff, transparent),
        radial-gradient(1px 1px at 130px 80px, #dbe7ff, transparent),
        radial-gradient(2px 2px at 200px 150px, #ffffff, transparent),
        radial-gradient(1px 1px at 300px 20px, #ebf2ff, transparent);
      background-size: 320px 220px;
      animation: driftA 80s linear infinite;
      opacity: 0.45;
    }

    .stars::before {
      background-image:
        radial-gradient(2px 2px at 60px 120px, #ffffff, transparent),
        radial-gradient(1px 1px at 180px 50px, #bcd3ff, transparent),
        radial-gradient(2px 2px at 270px 180px, #ffffff, transparent);
      background-size: 360px 260px;
      animation: driftB 120s linear infinite reverse;
      opacity: 0.4;
    }

    .stars::after {
      background-image:
        radial-gradient(1px 1px at 40px 20px, #ffffff, transparent),
        radial-gradient(2px 2px at 220px 100px, #ffffff, transparent),
        radial-gradient(1px 1px at 300px 190px, #c9dcff, transparent);
      background-size: 400px 280px;
      animation: driftA 150s linear infinite;
      opacity: 0.3;
    }

    @keyframes driftA {
      from { transform: translateY(0); }
      to { transform: translateY(-220px); }
    }

    @keyframes driftB {
      from { transform: translateX(0); }
      to { transform: translateX(-260px); }
    }

    .container {
      position: relative;
      z-index: 1;
      max-width: 980px;
      margin: 0 auto;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .panel {
      width: min(900px, 100%);
      background: var(--glass);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 24px;
      box-shadow: 0 20px 80px rgba(0, 0, 0, 0.45);
      backdrop-filter: blur(8px);
      padding: 28px;
    }

    h1 {
      font-size: clamp(2rem, 5vw, 3.6rem);
      line-height: 1.1;
      margin-bottom: 14px;
      letter-spacing: 1px;
      text-align: center;
      text-shadow: 0 0 20px rgba(110, 243, 255, 0.45);
    }

    .subtitle {
      text-align: center;
      color: #e3ebff;
      margin-bottom: 26px;
      opacity: 0.92;
    }

    .controls {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
      margin-bottom: 22px;
    }

    button {
      border: none;
      border-radius: 999px;
      padding: 10px 16px;
      font-weight: 700;
      cursor: pointer;
      color: #0e1130;
      background: linear-gradient(120deg, var(--accent-a), var(--accent-b));
      transition: transform 150ms ease, box-shadow 150ms ease, filter 150ms ease;
      box-shadow: 0 8px 20px rgba(24, 231, 255, 0.3);
    }

    button:hover {
      transform: translateY(-2px);
      filter: brightness(1.08);
    }

    button:active {
      transform: translateY(0);
    }

    .orbits {
      position: relative;
      width: min(520px, 88vw);
      aspect-ratio: 1;
      margin: 0 auto;
      border-radius: 50%;
      display: grid;
      place-items: center;
      overflow: visible;
    }

    .ring {
      position: absolute;
      border: 1px dashed rgba(255, 255, 255, 0.28);
      border-radius: 50%;
      animation: spin linear infinite;
    }

    .ring.r1 { width: 32%; height: 32%; animation-duration: 9s; }
    .ring.r2 { width: 52%; height: 52%; animation-duration: 14s; animation-direction: reverse; }
    .ring.r3 { width: 72%; height: 72%; animation-duration: 20s; }
    .ring.r4 { width: 92%; height: 92%; animation-duration: 28s; animation-direction: reverse; }

    .planet {
      --size: 16px;
      --orbit: 130px;
      --speed: 10s;
      --angle: 0deg;
      --color: var(--accent-a);
      position: absolute;
      width: var(--size);
      height: var(--size);
      border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, #ffffff, var(--color));
      box-shadow: 0 0 16px var(--color);
      transform-origin: center;
      animation: orbit var(--speed) linear infinite;
      filter: saturate(1.15);
    }

    .planet::after {
      content: "";
      position: absolute;
      inset: -8px;
      border-radius: 50%;
      background: radial-gradient(circle, var(--color) 0%, transparent 70%);
      opacity: 0.25;
      z-index: -1;
    }

    .sun {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, #fff6bd, #ffad47 65%, #ff7432);
      box-shadow: 0 0 45px rgba(255, 177, 80, 0.8);
      animation: pulse 2.8s ease-in-out infinite;
    }

    .planet.p1 { --orbit: 85px; --size: 11px; --speed: 6.2s; --color: #72f4ff; --angle: 0deg; }
    .planet.p2 { --orbit: 130px; --size: 14px; --speed: 9.4s; --color: #93ffbf; --angle: 100deg; }
    .planet.p3 { --orbit: 175px; --size: 12px; --speed: 13.5s; --color: #ffd96e; --angle: 220deg; }
    .planet.p4 { --orbit: 220px; --size: 16px; --speed: 18.5s; --color: #ff85e7; --angle: 310deg; }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    @keyframes orbit {
      from { transform: rotate(var(--angle)) translateX(var(--orbit)) rotate(calc(var(--angle) * -1)); }
      to { transform: rotate(calc(360deg + var(--angle))) translateX(var(--orbit)) rotate(calc(-360deg - var(--angle))); }
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.08); }
    }

    .message {
      margin-top: 22px;
      text-align: center;
      font-size: 1.02rem;
      min-height: 1.2em;
      color: #f8fbff;
      text-shadow: 0 0 10px rgba(255, 255, 255, 0.2);
    }

    @media (max-width: 680px) {
      .panel { padding: 20px; }
      .sun { width: 74px; height: 74px; }
      .planet.p4 { --orbit: 190px; }
      .planet.p3 { --orbit: 150px; }
    }
  </style>
</head>
<body>
  <div class="stars"></div>
  <main class="container">
    <section class="panel">
      <h1>Cosmic Playground</h1>
      <p class="subtitle">Tiny planets orbiting a live star. Click buttons to remix the universe.</p>
      <div class="controls">
        <button id="colorBtn">Shift Colors</button>
        <button id="speedBtn">Warp Speed</button>
        <button id="quoteBtn">Cosmic Message</button>
      </div>
      <div class="orbits" id="orbits">
        <div class="ring r1"></div>
        <div class="ring r2"></div>
        <div class="ring r3"></div>
        <div class="ring r4"></div>
        <div class="sun"></div>
        <div class="planet p1"></div>
        <div class="planet p2"></div>
        <div class="planet p3"></div>
        <div class="planet p4"></div>
      </div>
      <p class="message" id="message">Universe is stable.</p>
    </section>
  </main>

  <script>
    const root = document.documentElement;
    const message = document.getElementById("message");
    const planets = [...document.querySelectorAll(".planet")];
    const rings = [...document.querySelectorAll(".ring")];

    const palettes = [
      ["#6ef3ff", "#ff7ae0", "#ffe97a"],
      ["#99ffa3", "#72a7ff", "#ffd380"],
      ["#ff8d8d", "#9c8dff", "#86ffd1"],
      ["#a1f4ff", "#ffc0f2", "#f9ff88"]
    ];

    const quotes = [
      "Starlight is just old stories reaching us now.",
      "Every orbit is a promise to return.",
      "Tiny worlds can make huge beauty.",
      "Even chaos can be a kind of dance.",
      "Curiosity is rocket fuel for humans."
    ];

    let paletteIndex = 0;
    let fast = false;

    document.getElementById("colorBtn").addEventListener("click", () => {
      paletteIndex = (paletteIndex + 1) % palettes.length;
      const [a, b, c] = palettes[paletteIndex];
      root.style.setProperty("--accent-a", a);
      root.style.setProperty("--accent-b", b);
      root.style.setProperty("--accent-c", c);
      message.textContent = "Color spectrum shifted.";
    });

    document.getElementById("speedBtn").addEventListener("click", () => {
      fast = !fast;
      planets.forEach((planet) => {
        const base = parseFloat(getComputedStyle(planet).getPropertyValue("--speed"));
        planet.style.setProperty("--speed", `${fast ? (base * 0.55).toFixed(2) : (base / 0.55).toFixed(2)}s`);
      });
      rings.forEach((ring) => {
        const dur = parseFloat(getComputedStyle(ring).animationDuration);
        ring.style.animationDuration = `${fast ? (dur * 0.6).toFixed(2) : (dur / 0.6).toFixed(2)}s`;
      });
      message.textContent = fast ? "Warp drive engaged." : "Back to calm orbit.";
    });

    document.getElementById("quoteBtn").addEventListener("click", () => {
      const i = Math.floor(Math.random() * quotes.length);
      message.textContent = quotes[i];
    });

    document.getElementById("orbits").addEventListener("mousemove", (event) => {
      const x = (event.clientX / window.innerWidth - 0.5) * 14;
      const y = (event.clientY / window.innerHeight - 0.5) * 14;
      event.currentTarget.style.transform = `rotateX(${-y}deg) rotateY(${x}deg)`;
    });

    document.getElementById("orbits").addEventListener("mouseleave", (event) => {
      event.currentTarget.style.transform = "rotateX(0deg) rotateY(0deg)";
    });
  </script>
</body>
</html>
